name: api

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "content/**"
      - ".github/workflows/api.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore apps/api/Portfolio.slnx

      - name: Build
        run: dotnet build apps/api/Portfolio.slnx --no-restore -c Release

      - name: Test
        run: dotnet test apps/api/Portfolio.slnx --no-build -c Release

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy deploy
        run: |
          curl -fsS -X POST "https://${{ secrets.DOKPLOY_API_URL }}/api/application.deploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -d "{\"applicationId\": \"${{ secrets.DOKPLOY_APP_ID_API }}\"}"

      - name: Verify deploy is healthy
        run: |
          for i in $(seq 1 18); do
            resp="$(curl -fsS https://api.emran.blog/api/health || true)"
            sha="$(echo "$resp" | jq -r '.gitSha // empty')"
            if echo "$resp" | grep -q '"status":"ok"' && [ "$sha" = "${{ github.sha }}" ]; then
              echo "Health check passed, gitSha matches ${{ github.sha }}"
              exit 0
            fi
            echo "Waiting for deploy... (got sha: ${sha:-none})"
            sleep 5
          done
          echo "Deploy verification failed: /api/health never returned ok with matching gitSha"
          exit 1
